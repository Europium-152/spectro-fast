name: Build and publish wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15, macos-14]
        # macos-15 = x86_64, macos-14 = arm64

    steps:
      - uses: actions/checkout@v5

      # ── Build FFTW from source (macOS only, on host) ──
      # Linux FFTW is built inside the manylinux container via CIBW_BEFORE_ALL
      # Windows uses vendored DLLs
      - name: Build FFTW (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://www.fftw.org/fftw-3.3.10.tar.gz -o fftw.tar.gz
          echo "56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467  fftw.tar.gz" | shasum -a 256 --check
          tar xzf fftw.tar.gz
          cd fftw-3.3.10
          ./configure --prefix=${{ github.workspace }}/fftw_install --disable-shared --enable-static
          make -j$(sysctl -n hw.ncpu)
          make install

      # ── Windows: set up MSVC and create import lib from .def ──
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create MSVC import lib (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd spectrofast\_vendor_win
          lib /def:libfftw3-3.def /out:fftw3-3.lib /machine:x64

      # ── Build wheels ──
      - uses: pypa/cibuildwheel@v2.21.3
        env:
          # Linux: build FFTW inside the manylinux container
          CIBW_BEFORE_ALL_LINUX: >
            curl -L https://www.fftw.org/fftw-3.3.10.tar.gz -o fftw.tar.gz &&
            echo "56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467  fftw.tar.gz" | sha256sum --check &&
            tar xzf fftw.tar.gz &&
            cd fftw-3.3.10 &&
            ./configure --prefix=/opt/fftw --with-pic --disable-shared --enable-static &&
            make -j$(nproc) &&
            make install

          # Tell _fft_build.py where static FFTW lives
          CIBW_ENVIRONMENT_LINUX: FFTW_STATIC_DIR=/opt/fftw
          CIBW_ENVIRONMENT_MACOS: FFTW_STATIC_DIR=${{ github.workspace }}/fftw_install

          # Repair wheels to bundle shared libs
          # Linux/macOS: auditwheel/delocate verify the wheel is self-contained
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}
          # Windows: delvewheel bundles libfftw3-3.dll into the wheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair
            --add-path ${{ github.workspace }}/spectrofast/_vendor_win
            -w {dest_dir} {wheel}

          # Build for CPython only, skip 32-bit and musllinux
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"

          # Install delvewheel on Windows before building
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel

          # Run tests after building each wheel
          CIBW_TEST_REQUIRES: numpy pytest
          CIBW_BEFORE_TEST: pip install scipy || true
          CIBW_TEST_COMMAND: pytest {project}/tests/

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution ──
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI on tagged releases ──
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Collect all dists into one folder
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
